<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- background -->
  <rect width="512" height="512" rx="96" fill="#0d9488"/>
  <!-- subtle pasture gradient -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#g)"/>
  <!-- bovine head silhouette (stylized) -->
  <g transform="translate(256 280)">
    <!-- horns -->
    <path d="M -110 -40 Q -150 -110 -90 -120 Q -100 -80 -70 -60 Z" fill="#fef3c7"/>
    <path d="M  110 -40 Q  150 -110  90 -120 Q  100 -80  70 -60 Z" fill="#fef3c7"/>
    <!-- head -->
    <ellipse cx="0" cy="0" rx="105" ry="95" fill="#fef3c7"/>
    <!-- muzzle -->
    <ellipse cx="0" cy="55" rx="55" ry="38" fill="#fde68a"/>
    <!-- nostrils -->
    <ellipse cx="-18" cy="52" rx="6" ry="9" fill="#78350f"/>
    <ellipse cx=" 18" cy="52" rx="6" ry="9" fill="#78350f"/>
    <!-- eyes -->
    <circle cx="-38" cy="-22" r="9" fill="#1e293b"/>
    <circle cx=" 38" cy="-22" r="9" fill="#1e293b"/>
    <!-- ear left -->
    <ellipse cx="-86" cy="-12" rx="22" ry="40" fill="#fbbf24" transform="rotate(-25 -86 -12)"/>
    <ellipse cx=" 86" cy="-12" rx="22" ry="40" fill="#fbbf24" transform="rotate( 25  86 -12)"/>
  </g>
  <!-- corner badge: WiFi off (offline-first signature) -->
  <g transform="translate(420 100)">
    <circle r="36" fill="#fbbf24" stroke="#0f172a" stroke-width="4"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui" font-weight="900" font-size="34" fill="#0f172a">⌀</text>
  </g>
  <!-- brand -->
  <text x="256" y="450" text-anchor="middle" font-family="system-ui" font-weight="900" font-size="56" fill="#ffffff" letter-spacing="2">BrPec</text>
</svg>
